version: '3.8'

services:
  snowflake-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: snowflake-mcp-server:latest
    container_name: snowflake-mcp-server
    environment:
      # Required: Set these in a .env file or pass them via command line
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_USERNAME: ${SNOWFLAKE_USERNAME}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}

      # Authentication: Choose one method (uncomment as needed)

      # Method 1: External Browser / Okta SSO (default, requires GUI)
      # For Okta: Set SNOWFLAKE_AUTHENTICATOR=https://your-company.okta.com
      SNOWFLAKE_AUTHENTICATOR: ${SNOWFLAKE_AUTHENTICATOR:-externalbrowser}

      # Method 2: Username/Password (simplest, no admin access needed)
      # Uncomment the line below when using password authentication
      # SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}

      # Method 3: Key Pair (most secure, requires admin setup)
      # SNOWFLAKE_AUTHENTICATOR: snowflake_jwt
      # SNOWFLAKE_PRIVATE_KEY_PATH: /keys/snowflake_key.pem

      # Optional: Uncomment and set if needed
      # TRANSPORT: ${TRANSPORT:-stdio}
      # HOST: ${HOST:-127.0.0.1}
      # PORT: ${PORT:-8000}
      # DEBUG: ${DEBUG:-false}

    # For stdio transport (default)
    stdin_open: true
    tty: true

    # For http transport, uncomment the following:
    # ports:
    #   - "${PORT:-8000}:${PORT:-8000}"

    # Optional: Mount local directory for development
    # volumes:
    #   - ./server:/app/server:ro
