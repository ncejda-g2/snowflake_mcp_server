name: CI

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to compare versions

      - name: Checkout main branch
        run: git fetch origin main:main

      - name: Detect source changes
        id: changes
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Version bump only required when server/ source code changes
          SRC_FILES=$(echo "$CHANGED_FILES" | grep -E '^server/|^main\.py$|^requirements.*\.txt$|^uv\.lock$|^bin/' || true)

          if [ -n "$SRC_FILES" ]; then
            echo "🔧 Source changes detected — version bump required"
            echo "needs_version_bump=true" >> $GITHUB_OUTPUT
          else
            echo "📄 No server/ changes — skipping version bump checks"
            echo "needs_version_bump=false" >> $GITHUB_OUTPUT
          fi

      - name: Check version bump
        if: steps.changes.outputs.needs_version_bump == 'true'
        id: version-check
        run: |
          # Get version from PR branch
          PR_VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml | head -1)

          # Get version from main branch
          MAIN_VERSION=$(git show main:pyproject.toml | grep -oP 'version = "\K[^"]+' | head -1)

          echo "Main version: $MAIN_VERSION"
          echo "PR version: $PR_VERSION"

          # Compare versions
          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo "❌ Version not bumped! Please update version in pyproject.toml"
            echo "Current: $MAIN_VERSION"
            exit 1
          fi

          # Simple version comparison (works for semver)
          if [ "$(printf '%s\n' "$MAIN_VERSION" "$PR_VERSION" | sort -V | tail -1)" != "$PR_VERSION" ]; then
            echo "❌ PR version must be greater than main version"
            echo "Main: $MAIN_VERSION → PR: $PR_VERSION"
            exit 1
          fi

          echo "✅ Version bumped correctly: $MAIN_VERSION → $PR_VERSION"

      - name: Check README version badge
        if: steps.changes.outputs.needs_version_bump == 'true'
        run: |
          # Get version from pyproject.toml
          PR_VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml | head -1)

          # Extract version from README badge
          README_VERSION=$(grep -oP 'version-v\K[0-9]+\.[0-9]+\.[0-9]+' README.md || echo "")

          echo "pyproject.toml version: $PR_VERSION"
          echo "README badge version: $README_VERSION"

          if [ "$README_VERSION" != "$PR_VERSION" ]; then
            echo "❌ README version badge does not match pyproject.toml version!"
            echo "Expected: v$PR_VERSION"
            echo "Found: v$README_VERSION"
            echo "Please update the version badge in README.md to match pyproject.toml"
            exit 1
          fi

          echo "✅ README version badge matches pyproject.toml"

      - name: Check package.json version
        if: steps.changes.outputs.needs_version_bump == 'true'
        run: |
          # Get version from pyproject.toml
          PR_VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml | head -1)

          # Get version from package.json
          PKG_VERSION=$(grep -oP '"version": "\K[^"]+' package.json || echo "")

          echo "pyproject.toml version: $PR_VERSION"
          echo "package.json version: $PKG_VERSION"

          if [ "$PKG_VERSION" != "$PR_VERSION" ]; then
            echo "❌ package.json version does not match pyproject.toml version!"
            echo "Expected: $PR_VERSION"
            echo "Found: $PKG_VERSION"
            echo "Please update the version in package.json to match pyproject.toml"
            exit 1
          fi

          echo "✅ package.json version matches pyproject.toml"

      - name: Check CHANGELOG update
        if: steps.changes.outputs.needs_version_bump == 'true'
        run: |
          # Check if CHANGELOG.md exists
          if [ ! -f "CHANGELOG.md" ]; then
            echo "❌ CHANGELOG.md not found!"
            exit 1
          fi

          # Check if CHANGELOG.md was modified in this PR
          git diff --name-only origin/main...HEAD | grep -q "CHANGELOG.md"

          if [ $? -ne 0 ]; then
            echo "❌ CHANGELOG.md was not updated!"
            echo "Please add your changes to CHANGELOG.md"
            exit 1
          fi

          echo "✅ CHANGELOG.md was updated"

      - name: All validation checks passed
        run: |
          if [ "${{ steps.changes.outputs.needs_version_bump }}" != "true" ]; then
            echo "✅ No source changes — version checks skipped"
          else
            echo "✅ All PR validation checks passed!"
            echo "- Version bumped"
            echo "- README version badge updated"
            echo "- package.json version synced"
            echo "- CHANGELOG updated"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Run pre-commit
        run: |
          uv run pre-commit run --all-files
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Run linting
        run: |
          uv run ruff check .

      - name: Run formatting check
        run: |
          uv run ruff format --check .

      - name: Run tests
        run: |
          uv run pytest --cov=g2_mcp_server --cov-report=xml --cov-report=term-missing --junit-xml=test-results.xml

      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        if: matrix.python-version == '3.12'
        with:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Surface failing tests
        if: always()
        uses: pmeier/pytest-results-action@main
        with:
          path: test-results.xml
          summary: true
          display-options: fEX
          fail-on-empty: true

  install-test:
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Resolve and install all dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Verify core imports
        run: |
          uv run --python ${{ matrix.python-version }} python -c "
          from server.config import Config
          from server.schema_cache import SchemaCache
          from server.snowflake_connection import SnowflakeConnection
          from server.log_utils import setup_logging
          print('All core imports OK')
          "

      - name: Test server startup (degraded mode)
        shell: bash
        run: |
          uv run --python ${{ matrix.python-version }} python -c "
          import subprocess, sys
          proc = subprocess.Popen(
              [sys.executable, '-m', 'server'],
              stdin=subprocess.DEVNULL,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
          )
          try:
              _, stderr = proc.communicate(timeout=10)
              stderr_text = stderr.decode(errors='replace')
              print(stderr_text, file=sys.stderr)
              # Exit code 0 = clean shutdown (unexpected but ok)
              # Non-zero before timeout = crash
              if proc.returncode != 0:
                  print(f'FAIL: Server crashed with exit code {proc.returncode}')
                  sys.exit(1)
          except subprocess.TimeoutExpired:
              proc.kill()
              proc.wait()
              print('Server started successfully (killed after 10s timeout)')
          "

      - name: Build wheel
        run: uv build

      - name: Test MCPB bundle simulation
        shell: bash
        run: |
          mkdir -p /tmp/mcpb-test
          cp -r server pyproject.toml uv.lock main.py /tmp/mcpb-test/
          uv run --python ${{ matrix.python-version }} --directory /tmp/mcpb-test python -c "
          import subprocess, sys
          proc = subprocess.Popen(
              [sys.executable, '-m', 'server'],
              stdin=subprocess.DEVNULL,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              cwd='/tmp/mcpb-test',
          )
          try:
              _, stderr = proc.communicate(timeout=10)
              stderr_text = stderr.decode(errors='replace')
              print(stderr_text, file=sys.stderr)
              if proc.returncode != 0:
                  print(f'FAIL: MCPB simulation crashed with exit code {proc.returncode}')
                  sys.exit(1)
          except subprocess.TimeoutExpired:
              proc.kill()
              proc.wait()
              print('MCPB simulation started successfully (killed after 10s timeout)')
          "

  install-test-python314:
    name: "install-test (3.14 rejection)"
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Remove Xcode CLT (simulate user without C compiler)
        run: |
          sudo rm -rf /Library/Developer/CommandLineTools
          echo "Xcode CLT removed — no C compiler available"

      - name: Install Python 3.14 as only available version
        run: uv python install 3.14

      - name: Verify requires-python cap rejects 3.14
        run: |
          echo "Attempting uv sync --python 3.14 (should fail due to requires-python cap)..."
          if uv sync --python 3.14 2>cap-error.log; then
            echo "::error::Python 3.14 was NOT rejected by requires-python cap!"
            exit 1
          fi
          echo "✅ Python 3.14 correctly rejected by requires-python cap"
          echo "Error output:"
          cat cap-error.log

      - name: Verify uv auto-resolves to compatible Python
        run: |
          uv python install 3.13
          uv sync --python 3.13
          RESOLVED=$(uv run python --version)
          echo "uv resolved to: $RESOLVED"
          echo "✅ Auto-resolved to compatible Python version"

      - name: Verify server starts with auto-resolved Python
        shell: bash
        run: |
          uv run python -c "
          import subprocess, sys
          proc = subprocess.Popen(
              [sys.executable, '-m', 'server'],
              stdin=subprocess.DEVNULL,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
          )
          try:
              _, stderr = proc.communicate(timeout=10)
              stderr_text = stderr.decode(errors='replace')
              print(stderr_text, file=sys.stderr)
              if proc.returncode != 0:
                  print(f'FAIL: Server crashed with exit code {proc.returncode}')
                  sys.exit(1)
          except subprocess.TimeoutExpired:
              proc.kill()
              proc.wait()
              print('Server started successfully with fallback Python (killed after 10s timeout)')
          "
