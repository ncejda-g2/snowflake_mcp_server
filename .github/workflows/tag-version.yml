name: Tag, Release & Publish

on:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'package.json'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version-check
        run: |
          CURRENT_VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml | head -1)
          PREVIOUS_VERSION=$(git show HEAD~1:pyproject.toml | grep -oP 'version = "\K[^"]+' | head -1)

          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.version-check.outputs.version_changed == 'true'
        run: |
          VERSION="v${{ steps.version-check.outputs.new_version }}"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

          echo "Created and pushed tag $VERSION"

      - name: Create GitHub Release
        if: steps.version-check.outputs.version_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version-check.outputs.new_version }}"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping"
            exit 0
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes

          echo "Created GitHub Release $VERSION"

      - name: Setup Node.js
        if: steps.version-check.outputs.version_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        if: steps.version-check.outputs.version_changed == 'true'
        run: npm install -g npm@latest

      - name: Publish to npm
        if: steps.version-check.outputs.version_changed == 'true'
        run: npm publish --provenance --access public

      - name: Install uv
        if: steps.version-check.outputs.version_changed == 'true'
        uses: astral-sh/setup-uv@v4

      - name: Build Python package
        if: steps.version-check.outputs.version_changed == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.version-check.outputs.version_changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Build MCPB Desktop Extension
        if: steps.version-check.outputs.version_changed == 'true'
        run: |
          npx -y @anthropic-ai/mcpb validate manifest.json
          npx -y @anthropic-ai/mcpb pack .
          MCPB_FILE=$(ls *.mcpb)
          echo "mcpb_file=$MCPB_FILE" >> $GITHUB_ENV
          echo "Built MCPB: $MCPB_FILE"

      - name: Upload MCPB to GitHub Release
        if: steps.version-check.outputs.version_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version-check.outputs.new_version }}"
          gh release upload "$VERSION" "${{ env.mcpb_file }}" --clobber
