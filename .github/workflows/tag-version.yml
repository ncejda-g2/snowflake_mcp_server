name: Tag, Release & Publish

on:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'package.json'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish or recover, without leading v. Defaults to pyproject.toml version.'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

env:
  npm_cli_version: 11.12.0

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version-check
        run: |
          CURRENT_VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml | head -1)
          REQUESTED_VERSION="${{ github.event.inputs.version }}"

          if [ -n "$REQUESTED_VERSION" ]; then
            echo "Manual release/recovery requested for version: $REQUESTED_VERSION"
            echo "manual_recovery=true" >> $GITHUB_OUTPUT
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$REQUESTED_VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "manual_recovery=false" >> $GITHUB_OUTPUT

          PREVIOUS_VERSION=$(git show HEAD~1:pyproject.toml | grep -oP 'version = "\K[^"]+' | head -1)

          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.version-check.outputs.version_changed == 'true'
        run: |
          VERSION="v${{ steps.version-check.outputs.new_version }}"
          HEAD_COMMIT=$(git rev-parse HEAD)

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-list -n 1 "$VERSION")

            if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
              if [ "${{ steps.version-check.outputs.manual_recovery }}" = "true" ]; then
                echo "Tag $VERSION already exists at $TAG_COMMIT; manual recovery will reuse it while running at HEAD $HEAD_COMMIT"
                exit 0
              fi

              echo "Tag $VERSION already exists at $TAG_COMMIT, but HEAD is $HEAD_COMMIT"
              exit 1
            fi

            echo "Tag $VERSION already points to HEAD, reusing it"
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/tmp/tag-ref 2>/dev/null; then
            TAG_COMMIT=$(cut -f1 /tmp/tag-ref)

            if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
              if [ "${{ steps.version-check.outputs.manual_recovery }}" = "true" ]; then
                echo "Remote tag $VERSION already exists at $TAG_COMMIT; manual recovery will reuse it while running at HEAD $HEAD_COMMIT"
                exit 0
              fi

              echo "Remote tag $VERSION already exists at $TAG_COMMIT, but HEAD is $HEAD_COMMIT"
              exit 1
            fi

            echo "Remote tag $VERSION already points to HEAD, reusing it"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

          echo "Created and pushed tag $VERSION"

      - name: Create GitHub Release
        if: steps.version-check.outputs.version_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version-check.outputs.new_version }}"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists, reusing it"
            exit 0
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes

          echo "Created GitHub Release $VERSION"

      - name: Setup Node.js
        if: steps.version-check.outputs.version_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Build MCPB Desktop Extension
        if: steps.version-check.outputs.version_changed == 'true'
        run: |
          npx -y @anthropic-ai/mcpb validate manifest.json
          npx -y @anthropic-ai/mcpb pack .
          MCPB_FILE=$(ls *.mcpb)
          echo "mcpb_file=$MCPB_FILE" >> $GITHUB_ENV
          echo "Built MCPB: $MCPB_FILE"

      - name: Upload MCPB to GitHub Release
        if: steps.version-check.outputs.version_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version-check.outputs.new_version }}"
          gh release upload "$VERSION" "${{ env.mcpb_file }}" --clobber

      - name: Publish to npm
        if: steps.version-check.outputs.version_changed == 'true'
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/tmp/npm-view-version 2>/tmp/npm-view-error; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published, skipping npm publish"
            exit 0
          fi

          if ! grep -Eq 'E404|404 Not Found|No match found' /tmp/npm-view-error; then
            echo "Failed to check npm package version:"
            cat /tmp/npm-view-error
            exit 1
          fi

          echo "Publishing with npm $(npx -y npm@${{ env.npm_cli_version }} --version)"
          npx -y npm@${{ env.npm_cli_version }} publish --provenance --access public

      - name: Install uv
        if: steps.version-check.outputs.version_changed == 'true'
        uses: astral-sh/setup-uv@v4

      - name: Build Python package
        if: steps.version-check.outputs.version_changed == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.version-check.outputs.version_changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
