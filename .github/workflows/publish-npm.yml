name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for npm Trusted Publisher (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish  # Must match the environment name configured on npmjs.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # registry-url is required — without it, setup-node won't write
      # the .npmrc that npm needs for OIDC auth.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --provenance --access public
